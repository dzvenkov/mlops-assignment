<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Query Tester</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffdf8;
      --ink: #1f2933;
      --muted: #5b6773;
      --line: #d9cfbf;
      --accent: #b45309;
      --accent-strong: #92400e;
      --ok: #0f766e;
      --bad: #b91c1c;
      --code: #f6f1e8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, #fce7c6 0, transparent 28%),
        linear-gradient(180deg, #f7f2ea 0%, var(--bg) 100%);
      color: var(--ink);
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .card {
      background: color-mix(in srgb, var(--panel) 96%, white);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 14px 30px rgba(31, 41, 51, 0.06);
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: 1.1fr 0.9fr;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.92rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    input, select, textarea, button {
      font: inherit;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      background: white;
      color: var(--ink);
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .primary:hover {
      background: var(--accent-strong);
    }

    .secondary {
      background: #efe7d9;
      color: var(--ink);
    }

    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f5eee3;
      color: var(--muted);
      min-height: 48px;
    }

    .status.ok {
      background: #e8f6f4;
      color: var(--ok);
    }

    .status.error {
      background: #fdecec;
      color: var(--bad);
    }

    .result-block + .result-block {
      margin-top: 16px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--code);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 0.92rem;
      line-height: 1.45;
      min-height: 54px;
    }

    .meta {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f1e6d5;
      color: var(--muted);
      font-size: 0.88rem;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Agent Query Tester</h1>
    <p class="subtitle">Send a question to <code>/answer</code>, inspect the SQL, rows, and iteration history, and sanity-check revise-loop behavior.</p>

    <div class="grid">
      <section class="card">
        <div>
          <label for="db">Database</label>
          <select id="db"></select>
        </div>

        <div style="margin-top: 16px;">
          <label for="question">Question</label>
          <textarea id="question" placeholder="Ask a text-to-SQL question here..."></textarea>
        </div>

        <div style="margin-top: 16px;">
          <label for="tags">Tags JSON (optional)</label>
          <textarea id="tags" style="min-height: 90px;">{}</textarea>
        </div>

        <div class="actions">
          <button id="send" class="primary">Send Query</button>
          <button id="sample" class="secondary" type="button">Load Sample</button>
          <button id="clear" class="secondary" type="button">Clear</button>
        </div>

        <div id="status" class="status">Ready.</div>
      </section>

      <section class="card">
        <div class="meta">
          <div class="pill">Endpoint: <code>/answer</code></div>
          <div class="pill">Health: <span id="health">checking...</span></div>
        </div>

        <div class="result-block" style="margin-top: 18px;">
          <label>Final SQL</label>
          <pre id="sql"></pre>
        </div>

        <div class="result-block">
          <label>Rows</label>
          <pre id="rows"></pre>
        </div>

        <div class="result-block">
          <label>History</label>
          <pre id="history"></pre>
        </div>

        <div class="result-block">
          <label>Raw Response</label>
          <pre id="raw"></pre>
        </div>
      </section>
    </div>
  </main>

  <script>
    const sampleQuestions = [
      {
        db: "formula_1",
        question: "What is the coordinates location of the circuits for Australian grand prix?"
      },
      {
        db: "superhero",
        question: "List down Ajax's superpowers."
      },
      {
        db: "financial",
        question: "How many male clients in 'Hl.m. Praha' district?"
      }
    ];

    const dbSelect = document.getElementById("db");
    const questionInput = document.getElementById("question");
    const tagsInput = document.getElementById("tags");
    const statusBox = document.getElementById("status");
    const sqlBox = document.getElementById("sql");
    const rowsBox = document.getElementById("rows");
    const historyBox = document.getElementById("history");
    const rawBox = document.getElementById("raw");
    const healthBox = document.getElementById("health");
    const sendButton = document.getElementById("send");

    function setStatus(message, kind = "") {
      statusBox.textContent = message;
      statusBox.className = `status ${kind}`.trim();
    }

    function render(value) {
      return typeof value === "string" ? value : JSON.stringify(value, null, 2);
    }

    async function loadHealth() {
      try {
        const res = await fetch("/health");
        const data = await res.json();
        healthBox.textContent = data.status;
      } catch {
        healthBox.textContent = "unreachable";
      }
    }

    async function loadDbs() {
      try {
        const res = await fetch("/dbs");
        const data = await res.json();
        const dbs = data.dbs || [];
        dbSelect.innerHTML = "";
        for (const db of dbs) {
          const option = document.createElement("option");
          option.value = db;
          option.textContent = db;
          dbSelect.appendChild(option);
        }
        if (!dbs.length) {
          const option = document.createElement("option");
          option.value = "";
          option.textContent = "No DBs found";
          dbSelect.appendChild(option);
        }
      } catch (error) {
        setStatus(`Failed to load DB list: ${error}`, "error");
      }
    }

    function loadSample() {
      const sample = sampleQuestions[Math.floor(Math.random() * sampleQuestions.length)];
      questionInput.value = sample.question;
      if ([...dbSelect.options].some(opt => opt.value === sample.db)) {
        dbSelect.value = sample.db;
      }
      tagsInput.value = JSON.stringify({ source: "playground" }, null, 2);
      setStatus("Loaded a sample question.");
    }

    function clearOutputs() {
      sqlBox.textContent = "";
      rowsBox.textContent = "";
      historyBox.textContent = "";
      rawBox.textContent = "";
    }

    async function sendQuery() {
      const question = questionInput.value.trim();
      const db = dbSelect.value;
      if (!question) {
        setStatus("Enter a question before sending.", "error");
        return;
      }
      if (!db) {
        setStatus("Select a database first.", "error");
        return;
      }

      let tags = {};
      try {
        tags = JSON.parse(tagsInput.value || "{}");
      } catch (error) {
        setStatus(`Tags must be valid JSON: ${error.message}`, "error");
        return;
      }

      clearOutputs();
      setStatus("Waiting for agent response...");
      sendButton.disabled = true;

      try {
        const res = await fetch("/answer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, db, tags })
        });
        const data = await res.json();

        sqlBox.textContent = data.sql || "";
        rowsBox.textContent = render(data.rows);
        historyBox.textContent = render(data.history);
        rawBox.textContent = render(data);

        if (!res.ok) {
          setStatus(`Request failed: ${data.detail || res.statusText}`, "error");
        } else if (data.ok) {
          setStatus(`Success. Iterations: ${data.iterations}`, "ok");
        } else {
          setStatus(`Agent returned an error. Iterations: ${data.iterations}. ${data.error || ""}`.trim(), "error");
        }
      } catch (error) {
        setStatus(`Request failed: ${error}`, "error");
      } finally {
        sendButton.disabled = false;
      }
    }

    document.getElementById("send").addEventListener("click", sendQuery);
    document.getElementById("sample").addEventListener("click", loadSample);
    document.getElementById("clear").addEventListener("click", () => {
      questionInput.value = "";
      tagsInput.value = "{}";
      clearOutputs();
      setStatus("Cleared.");
    });

    loadHealth();
    loadDbs().then(() => {
      if (!questionInput.value) {
        loadSample();
      }
    });
  </script>
</body>
</html>
